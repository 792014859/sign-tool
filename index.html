<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>电子签字工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header */
        header { background: #1677ff; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        header h1 { font-size: 17px; font-weight: 500; }
        .btn { background: white; color: #1677ff; border: none; border-radius: 4px; padding: 6px 12px; font-size: 14px; cursor: pointer; }
        
        /* Toolbar */
        .toolbar { padding: 8px 10px; background: white; border-bottom: 1px solid #eee; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; flex-shrink: 0; }
        .toolbar input, .toolbar select { padding: 5px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .toolbar button { padding: 6px 12px; border: none; border-radius: 4px; background: #f0f0f0; cursor: pointer; font-size: 14px; }
        .toolbar button.primary { background: #1677ff; color: white; }
        .toolbar button.danger { background: #ff4d4f; color: white; }
        
        /* Workspace */
        #workspace { flex: 1; overflow: auto; background: #525659; display: flex; justify-content: center; align-items: flex-start; padding: 20px; position: relative; }
        #render-area { background: white; box-shadow: 0 2px 12px rgba(0,0,0,0.3); position: relative; transform-origin: top center; }
        #render-area img, #render-area canvas { display: block; max-width: 100%; }
        
        /* Signature Element */
        .signature { position: absolute; cursor: move; touch-action: none; z-index: 10; padding: 2px; }
        .signature.active { outline: 2px dashed #1677ff; }
        .signature-text { font-family: 'KaiTi', 'STKaiti', serif; color: #000; white-space: nowrap; pointer-events: none; text-shadow: 0 0 1px white; }
        .signature-handle { position: absolute; right: -8px; bottom: -8px; width: 16px; height: 16px; background: #1677ff; border-radius: 50%; cursor: nwse-resize; touch-action: none; }
        
        /* Modal for Handwriting */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal.show { display: flex; }
        .modal-content { background: white; border-radius: 8px; padding: 20px; width: 90%; max-width: 350px; }
        .modal-content h3 { margin-bottom: 15px; }
        #hand-canvas { width: 100%; height: 180px; border: 1px solid #ddd; border-radius: 4px; background: white; touch-action: none; cursor: crosshair; }
        .modal-actions { margin-top: 15px; display: flex; gap: 10px; }
        .modal-actions button { flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; }
        .modal-actions .confirm { background: #1677ff; color: white; }
        .modal-actions .cancel { background: #f0f0f0; }
        
        /* Loading */
        #loading { position: fixed; inset: 0; background: rgba(0,0,0,0.6); color: white; display: none; justify-content: center; align-items: center; z-index: 200; font-size: 16px; }
    </style>
</head>
<body>

<header>
    <h1>📝 电子签字</h1>
    <button class="btn" onclick="document.getElementById('file-input').click()">上传文件</button>
    <input type="file" id="file-input" accept="image/*,.pdf" hidden>
</header>

<div class="toolbar">
    <!-- Text Sign Controls -->
    <input type="text" id="sign-text" value="张三" placeholder="签名内容" style="width: 80px;">
    <select id="font-family">
        <option value="'KaiTi', 'STKaiti', serif">楷体</option>
        <option value="'SimSun', serif">宋体</option>
        <option value="'Microsoft YaHei', sans-serif">微软雅黑</option>
    </select>
    <select id="font-size">
        <option value="20">20px</option>
        <option value="28" selected>28px</option>
        <option value="36">36px</option>
        <option value="48">48px</option>
    </select>
    <select id="font-color">
        <option value="#000000">黑色</option>
        <option value="#cc0000">红色</option>
        <option value="#0033aa">蓝色</option>
    </select>
    <button onclick="addTextSignature()">添加文字</button>
    
    <!-- Hand Sign Button -->
    <button onclick="openHandModal()">✍️ 手写</button>
    
    <!-- Actions -->
    <button class="danger" onclick="deleteActive()">删除</button>
    <button class="primary" onclick="saveImage()">💾 保存图片</button>
</div>

<div id="workspace">
    <div id="render-area"></div>
</div>

<!-- Handwriting Modal -->
<div class="modal" id="hand-modal">
    <div class="modal-content">
        <h3>手写签名</h3>
        <canvas id="hand-canvas"></canvas>
        <div class="modal-actions">
            <button class="cancel" onclick="clearCanvas()">清除</button>
            <button class="cancel" onclick="closeHandModal()">取消</button>
            <button class="confirm" onclick="applyHandSignature()">确认</button>
        </div>
    </div>
</div>

<div id="loading">正在处理...</div>

<!-- Local Libraries (Download these and place in same folder) -->
<script src="./html2canvas.min.js"></script>
<script src="./jspdf.umd.min.js"></script>
<script src="./pdf.min.js"></script>

<script>
// --- Global State ---
let activeSig = null;
let scale = 1; // Scale factor between screen and original document
let isDrawing = false;
let lastX = 0, lastY = 0;

// --- DOM Elements ---
const fileInput = document.getElementById('file-input');
const renderArea = document.getElementById('render-area');
const loading = document.getElementById('loading');
const handModal = document.getElementById('hand-modal');
const handCanvas = document.getElementById('hand-canvas');
const hCtx = handCanvas.getContext('2d');

// --- Initialization ---
fileInput.addEventListener('change', handleFileUpload);
setupCanvas();

// --- File Handling ---
function handleFileUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    loading.style.display = 'flex';
    renderArea.innerHTML = '';
    activeSig = null;

    const reader = new FileReader();
    
    if (file.type.startsWith('image/')) {
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                renderArea.innerHTML = '';
                renderArea.appendChild(img);
                scale = renderArea.offsetWidth / img.naturalWidth;
                loading.style.display = 'none';
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    } else if (file.type === 'application/pdf') {
        reader.onload = async (ev) => {
            const typedarray = new Uint8Array(ev.target.result);
            const pdf = await pdfjsLib.getDocument({ data: typedarray }).promise;
            const page = await pdf.getPage(1);
            const viewport = page.getViewport({ scale: 1.5 });
            
            const canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            const ctx = canvas.getContext('2d');
            
            await page.render({ canvasContext: ctx, viewport: viewport }).promise;
            renderArea.innerHTML = '';
            renderArea.appendChild(canvas);
            scale = renderArea.offsetWidth / canvas.width;
            loading.style.display = 'none';
        };
        reader.readAsArrayBuffer(file);
    }
}

// --- Signature Logic ---
function addTextSignature() {
    const sig = createSignatureElement();
    const text = document.getElementById('sign-text').value || '签名';
    const font = document.getElementById('font-family').value;
    const size = document.getElementById('font-size').value;
    const color = document.getElementById('font-color').value;
    
    sig.querySelector('.signature-text').innerHTML = text;
    sig.querySelector('.signature-text').style.cssText = `
        font-family: ${font};
        font-size: ${size}px;
        color: ${color};
    `;
    renderArea.appendChild(sig);
    selectSignature(sig);
}

function openHandModal() {
    handModal.classList.add('show');
    clearCanvas();
}
function closeHandModal() { handModal.classList.remove('show'); }

function setupCanvas() {
    hCtx.strokeStyle = '#000';
    hCtx.lineWidth = 2.5;
    hCtx.lineCap = 'round';
    hCtx.lineJoin = 'round';
    
    handCanvas.addEventListener('mousedown', startDraw);
    handCanvas.addEventListener('mousemove', draw);
    handCanvas.addEventListener('mouseup', stopDraw);
    handCanvas.addEventListener('mouseout', stopDraw);
    
    handCanvas.addEventListener('touchstart', (e) => { startDraw(e.touches[0]); e.preventDefault(); }, { passive: false });
    handCanvas.addEventListener('touchmove', (e) => { draw(e.touches[0]); e.preventDefault(); }, { passive: false });
    handCanvas.addEventListener('touchend', stopDraw);
}

function startDraw(pos) {
    isDrawing = true;
    const rect = handCanvas.getBoundingClientRect();
    [lastX, lastY] = [pos.clientX - rect.left, pos.clientY - rect.top];
}
function draw(pos) {
    if (!isDrawing) return;
    const rect = handCanvas.getBoundingClientRect();
    const x = pos.clientX - rect.left;
    const y = pos.clientY - rect.top;
    hCtx.beginPath();
    hCtx.moveTo(lastX, lastY);
    hCtx.lineTo(x, y);
    hCtx.stroke();
    [lastX, lastY] = [x, y];
}
function stopDraw() { isDrawing = false; }
function clearCanvas() { hCtx.clearRect(0, 0, handCanvas.width, handCanvas.height); }

function applyHandSignature() {
    const croppedImg = cropCanvas(hCtx, handCanvas.width, handCanvas.height);
    if (!croppedImg) { alert('请先签名'); return; }
    
    const sig = createSignatureElement();
    sig.querySelector('.signature-text').innerHTML = `<img src="${croppedImg}" style="height:60px;">`;
    renderArea.appendChild(sig);
    selectSignature(sig);
    closeHandModal();
}

function createSignatureElement() {
    const div = document.createElement('div');
    div.className = 'signature';
    div.innerHTML = `
        <div class="signature-text"></div>
        <div class="signature-handle"></div>
    `;
    div.style.left = '50px';
    div.style.top = '50px';
    
    // Event Listeners for drag/resize
    let startX, startY, startLeft, startTop;
    div.addEventListener('touchstart', (e) => {
        if (e.target.classList.contains('signature-handle')) return;
        selectSignature(div);
        const t = e.touches[0];
        startX = t.clientX; startY = t.clientY;
        startLeft = div.offsetLeft; startTop = div.offsetTop;
        e.preventDefault();
    }, { passive: false });
    
    div.addEventListener('touchmove', (e) => {
        if (e.target.classList.contains('signature-handle') || !div.classList.contains('active')) return;
        const t = e.touches[0];
        div.style.left = (startLeft + t.clientX - startX) + 'px';
        div.style.top = (startTop + t.clientY - startY) + 'px';
        e.preventDefault();
    }, { passive: false });

    // Resize logic
    const handle = div.querySelector('.signature-handle');
    handle.addEventListener('touchstart', (e) => {
        selectSignature(div);
        e.stopPropagation();
    });
    handle.addEventListener('touchmove', (e) => {
        const t = e.touches[0];
        const rect = div.getBoundingClientRect();
        const newWidth = Math.max(40, t.clientX - rect.left);
        div.style.fontSize = (newWidth / 4) + 'px'; // Simple scaling
        e.preventDefault();
    }, { passive: false });

    return div;
}

function selectSignature(el) {
    if (activeSig) activeSig.classList.remove('active');
    activeSig = el;
    activeSig.classList.add('active');
}

function deleteActive() {
    if (activeSig) { activeSig.remove(); activeSig = null; }
}

// --- Utility: Crop signature canvas ---
function cropCanvas(ctx, w, h) {
    const imgData = ctx.getImageData(0, 0, w, h);
    let [top, bottom, left, right] = [h, 0, w, 0];
    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            const alpha = imgData.data[(y * w + x) * 4 + 3];
            if (alpha > 10) {
                top = Math.min(top, y);
                bottom = Math.max(bottom, y);
                left = Math.min(left, x);
                right = Math.max(right, x);
            }
        }
    }
    if (top > bottom) return null; // Empty canvas
    const cropH = bottom - top + 4;
    const cropW = right - left + 4;
    const cropCanvas = document.createElement('canvas');
    cropCanvas.width = cropW;
    cropCanvas.height = cropH;
    cropCanvas.getContext('2d').putImageData(ctx.getImageData(left - 2, top - 2, cropW, cropH), 0, 0);
    return cropCanvas.toDataURL('image/png');
}

// --- Export ---
function saveImage() {
    if (!renderArea.firstChild) return alert('请先上传文件');
    loading.style.display = 'flex';
    html2canvas(renderArea, {
        scale: 2,
        useCORS: true,
        backgroundColor: '#ffffff'
    }).then(canvas => {
        const link = document.createElement('a');
        link.download = `signed_${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        loading.style.display = 'none';
    });
}

// Deselect when clicking empty workspace
document.getElementById('workspace').addEventListener('click', (e) => {
    if (e.target.id === 'workspace' || e.target.id === 'render-area') {
        if (activeSig) activeSig.classList.remove('active');
        activeSig = null;
    }
});
</script>
</body>
</html>
