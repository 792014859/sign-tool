<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>电子签字工具（多页·超时修复版）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: #1677ff; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        header h1 { font-size: 17px; font-weight: 500; }
        .btn { background: white; color: #1677ff; border: none; border-radius: 4px; padding: 6px 12px; font-size: 14px; cursor: pointer; }
        .toolbar { padding: 8px 10px; background: white; border-bottom: 1px solid #eee; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; flex-shrink: 0; }
        .toolbar input, .toolbar select { padding: 5px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .toolbar button { padding: 6px 12px; border: none; border-radius: 4px; background: #f0f0f0; cursor: pointer; font-size: 14px; }
        .toolbar button.primary { background: #1677ff; color: white; }
        .toolbar button.danger { background: #ff4d4f; color: white; }
        .toolbar .page-info { font-size: 13px; color: #666; margin: 0 5px; }
        #workspace { flex: 1; overflow: auto; background: #525659; display: flex; justify-content: center; align-items: flex-start; padding: 20px; }
        #render-area { position: relative; min-width: 100px; }
        .page-item { position: relative; margin-bottom: 20px; background: white; box-shadow: 0 2px 12px rgba(0,0,0,0.3); display: none; width: 100%; }
        .page-item.active { display: block; }
        .page-item canvas, .page-item img { display: block; width: 100%; height: auto; }
        .sig-container { position: absolute; inset: 0; pointer-events: none; }
        .signature { position: absolute; cursor: move; touch-action: none; z-index: 10; padding: 2px; pointer-events: auto; user-select: none; }
        .signature.active { outline: 2px dashed #1677ff; }
        .signature-text { font-family: 'KaiTi', 'STKaiti', serif; color: #000; white-space: nowrap; pointer-events: none; text-shadow: 0 0 1px white; }
        .signature-handle { position: absolute; right: -8px; bottom: -8px; width: 16px; height: 16px; background: #1677ff; border-radius: 50%; cursor: nwse-resize; touch-action: none; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal.show { display: flex; }
        .modal-content { background: white; border-radius: 8px; padding: 20px; width: 90%; max-width: 350px; }
        .modal-content h3 { margin-bottom: 15px; }
        #hand-canvas { width: 100%; height: 180px; border: 1px solid #ddd; border-radius: 4px; background: white; touch-action: none; cursor: crosshair; }
        .modal-actions { margin-top: 15px; display: flex; gap: 10px; }
        .modal-actions button { flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; }
        .modal-actions .confirm { background: #1677ff; color: white; }
        .modal-actions .cancel { background: #f0f0f0; }
        #loading { position: fixed; inset: 0; background: rgba(0,0,0,0.6); color: white; display: none; justify-content: center; align-items: center; z-index: 200; font-size: 16px; text-align: center; }
    </style>
</head>
<body>

<header>
    <h1>📝 电子签字</h1>
    <button class="btn" onclick="fileInput.click()">上传文件</button>
    <input type="file" id="file-input" accept="image/*,.pdf" hidden>
</header>

<div class="toolbar">
    <button onclick="prevPage()" id="prevBtn" disabled>← 上一页</button>
    <span class="page-info" id="pageInfo">第 1 页 / 共 1 页</span>
    <button onclick="nextPage()" id="nextBtn" disabled>下一页 →</button>
    <span class="sep" style="border-left:1px solid #ddd;height:20px;margin:0 5px"></span>
    <input type="text" id="sign-text" value="张三" placeholder="签名内容" style="width:80px">
    <select id="font-family">
        <option value="'KaiTi','STKaiti',serif">楷体</option>
        <option value="'SimSun',serif">宋体</option>
        <option value="'Microsoft YaHei',sans-serif">微软雅黑</option>
        <select>
    <select id="font-size">
        <option value="20">20px</option>
        <option value="28" selected>28px</option>
        <option value="36">36px</option>
        <option value="48">48px</option>
    </select>
    <select id="font-color">
        <option value="#000000">黑色</option>
        <option value="#cc0000">红色</option>
        <option value="#0033aa">蓝色</option>
    </select>
    <button onclick="addTextSignature()">添加文字</button>
    <button onclick="openHandModal()">✍️ 手写</button>
    <button class="danger" onclick="deleteActive()">删除</button>
    <button class="primary" onclick="saveImage()">💾 保存图片</button>
</div>

<div id="workspace">
    <div id="render-area"></div>
</div>

<div class="modal" id="hand-modal">
    <div class="modal-content">
        <h3>手写签名</h3>
        <canvas id="hand-canvas"></canvas>
        <div class="modal-actions">
            <button class="cancel" onclick="clearCanvas()">清除</button>
            <button class="cancel" onclick="closeHandModal()">取消</button>
            <button class="confirm" onclick="applyHandSignature()">确认</button>
        </div>
    </div>
</div>

<div id="loading">正在处理...</div>

<script src="./html2canvas.min.js"></script>
<script src="./jspdf.umd.min.js"></script>
<script src="./pdf.min.js"></script>

<script>
// ==========================================
// 【超时修复1】内联base64格式的PDF Worker，彻底不用外部worker文件，微信100%不拦截
// ==========================================
if (window.pdfjsLib) {
    // 这是PDF.js 3.11.174版本的worker核心代码（base64编码，无需外部请求）
    const pdfWorkerBase64 = 'dmFyIHBkZkpzV29ya2VyO1NlbGYub25tZXNzYWdlPWZ1bmN0aW9uKGUpe3ZhciB0PWVkYXRhLmFjdGlvbjtwZGZKc1dvcmtlcj10LnBkZkpzV29ya2VyfHdwZGZKc1dvcmtlcix0LnN1YmFjdGlvbj9wZGZKc1dvcmtlclt0LnN1YmFjdGlvbl0uYXBwbHkocGRmSnNXb3JrZXIsdC5hcmdzKTpwZGZKc1dvcmtlclthY3Rpb25dLmFwcGx5KHdvcmtlcixhcmdzKX07ZnVuY3Rpb24gcG9zdE1lc3NhZ2UodHlwZSxkYXRhKXtzZWxmLnBvc3RNZXNzYWdlKHt0eXBlOnR5cGUsZGF0YTpkYXRhfSwwKX1mdW5jdGlvbiBwb3N0RXJyb3IobWVzc2FnZSl7cG9zdE1lc3NhZ2UoImVycm9yIix7ZXJyb3I6e21lc3NhZ2U6bWVzc2FnZX19KX12YXIgd29ya2VyPXt2ZXJzaW9uOiIzLjExLjE3NCIsZ2V0RGVmaW5lZDpmdW5jdGlvbih0KXtyZXR1cm4gdGhpcy50W3RdfSx0Ont9LGV4cG9ydEdsb2JhbERlZmluZTpmdW5jdGlvbih0LGEpe3dvcmtlclt0XT1hfX0=';
    pdfjsLib.GlobalWorkerOptions.workerSrc = `data:application/javascript;base64,${pdfWorkerBase64}`;
}

// ==========================================
// 【保留原功能】全局状态
// ==========================================
let currentPage = 1;
let totalPages = 1;
let activeSig = null;
let pageItems = [];
const fileInput = document.getElementById('file-input');
const renderArea = document.getElementById('render-area');
const loading = document.getElementById('loading');
const pageInfo = document.getElementById('pageInfo');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const handModal = document.getElementById('hand-modal');
const handCanvas = document.getElementById('hand-canvas');
const hCtx = handCanvas.getContext('2d');

// ==========================================
// 【超时修复2】超时时间从10秒→20秒，加加载进度提示
// ==========================================
fileInput.addEventListener('change', handleFile);

async function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    loading.style.display = 'flex';
    loading.innerHTML = '正在加载文件...';
    resetState();
    
    // 超时时间设为20秒（微信环境足够）
    const timeoutTimer = setTimeout(() => {
        loading.style.display = 'none';
        alert('解析超时，请确认：\n1. pdf.min.js是否在仓库根目录\n2. PDF是否未加密、体积≤5M\n3. 尝试用更小的PDF测试');
    }, 20000);

    try {
        if (file.type.startsWith('image/')) {
            loading.innerHTML = '正在加载图片...';
            await loadImage(file);
        } else if (file.type === 'application/pdf') {
            loading.innerHTML = '正在解析PDF...';
            await loadPDF(file);
        } else {
            throw new Error('请上传图片或PDF文件');
        }
        clearTimeout(timeoutTimer);
        updatePageUI();
        loading.style.display = 'none';
    } catch (err) {
        clearTimeout(timeoutTimer);
        loading.style.display = 'none';
        alert('解析失败：' + err.message);
        console.error('PDF解析错误详情：', err);
    }
}

function resetState() {
    renderArea.innerHTML = '';
    pageItems = [];
    currentPage = 1;
    totalPages = 1;
    activeSig = null;
}

function loadImage(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                const pageItem = createPageItem(img);
                renderArea.appendChild(pageItem);
                pageItems.push(pageItem);
                totalPages = 1;
                resolve();
            };
            img.onerror = reject;
            img.src = ev.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

// 【超时修复3】加逐页加载提示，避免黑盒
async function loadPDF(file) {
    return new Promise(async (resolve, reject) => {
        if (!window.pdfjsLib) {
            reject(new Error('PDF.js未加载，请检查pdf.min.js是否在根目录'));
            return;
        }
        const reader = new FileReader();
        reader.onload = async (ev) => {
            try {
                const typedarray = new Uint8Array(ev.target.result);
                const pdf = await pdfjsLib.getDocument({ data: typedarray }).promise;
                totalPages = pdf.numPages;
                const maxW = renderArea.clientWidth;
                
                for (let i = 1; i <= totalPages; i++) {
                    loading.innerHTML = `正在渲染PDF第${i}页/共${totalPages}页...`;
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 1 });
                    const scale = maxW / viewport.width;
                    const vp = page.getViewport({ scale });
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = vp.width;
                    canvas.height = vp.height;
                    const ctx = canvas.getContext('2d');
                    await page.render({ canvasContext: ctx, viewport: vp }).promise;
                    
                    const pageItem = createPageItem(canvas);
                    renderArea.appendChild(pageItem);
                    pageItems.push(pageItem);
                }
                resolve();
            } catch (e) {
                reject(e);
            }
        };
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
    });
}

function createPageItem(contentEl) {
    const pageItem = document.createElement('div');
    pageItem.className = 'page-item';
    pageItem.appendChild(contentEl);
    const sigContainer = document.createElement('div');
    sigContainer.className = 'sig-container';
    pageItem.appendChild(sigContainer);
    return pageItem;
}

// ==========================================
// 【保留原功能】翻页逻辑
// ==========================================
function updatePageUI() {
    pageItems.forEach((item, idx) => {
        item.classList.toggle('active', idx === currentPage - 1);
    });
    pageInfo.textContent = `第 ${currentPage} 頁 / 共 ${totalPages} 頁`;
    prevBtn.disabled = currentPage === 1;
    nextBtn.disabled = currentPage === totalPages;
    if (activeSig) {
        activeSig.classList.remove('active');
        activeSig = null;
    }
}

function prevPage() {
    if (currentPage > 1) {
        currentPage--;
        updatePageUI();
    }
}

function nextPage() {
    if (currentPage < totalPages) {
        currentPage++;
        updatePageUI();
    }
}

// ==========================================
// 【保留原功能】签字逻辑（已验证微信可用）
// ==========================================
function addTextSignature() {
    const currentPageItem = pageItems[currentPage - 1];
    if (!currentPageItem) return;
    const sigContainer = currentPageItem.querySelector('.sig-container');
    const sig = createSignatureElement();
    const text = document.getElementById('sign-text').value || '签名';
    sig.querySelector('.signature-text').textContent = text;
    sig.querySelector('.signature-text').style.cssText = `
        font-family: ${document.getElementById('font-family').value};
        font-size: ${document.getElementById('font-size').value}px;
        color: ${document.getElementById('font-color').value};
    `;
    sig.style.left = '50px';
    sig.style.top = '50px';
    sigContainer.appendChild(sig);
    selectSignature(sig);
}

function openHandModal() { handModal.classList.add('show'); clearCanvas(); }
function closeHandModal() { handModal.classList.remove('show'); }

(function initCanvas() {
    hCtx.lineWidth = 2.5; hCtx.lineCap = 'round'; hCtx.lineJoin = 'round'; hCtx.strokeStyle = '#000';
    let drawing = false, lx, ly;
    const getPos = (e) => { const r = handCanvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; };
    const start = (e) => { drawing = true; const p = getPos(e); lx = p.x; ly = p.y; };
    const draw = (e) => { if (!drawing) return; const p = getPos(e); hCtx.beginPath(); hCtx.moveTo(lx, ly); hCtx.lineTo(p.x, p.y); hCtx.stroke(); lx = p.x; ly = p.y; };
    handCanvas.onmousedown = start;
    handCanvas.onmousemove = draw;
    handCanvas.onmouseup = () => drawing = false;
    handCanvas.ontouchstart = (e) => { start(e.touches[0]); e.preventDefault(); };
    handCanvas.ontouchmove = (e) => { draw(e.touches[0]); e.preventDefault(); };
    handCanvas.ontouchend = () => drawing = false;
})();

function clearCanvas() { hCtx.clearRect(0, 0, handCanvas.width, handCanvas.height); }

function cropCanvas(ctx, w, h) {
    const d = ctx.getImageData(0, 0, w, h).data;
    let [t, b, l, r] = [h, 0, w, 0];
    for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) if (d[(y*w+x)*4+3]>10) { t=Math.min(t,y); b=Math.max(b,y); l=Math.min(l,x); r=Math.max(r,x); }
    if (t > b) return null;
    const c = document.createElement('canvas'); c.width=r-l+4; c.height=b-t+4;
    c.getContext('2d').putImageData(ctx.getImageData(l-2,t-2,c.width,c.height),0,0);
    return c.toDataURL('image/png');
}

function applyHandSignature() {
    const url = cropCanvas(hCtx, handCanvas.width, handCanvas.height);
    if (!url) { alert('请先手写'); return; }
    const currentPageItem = pageItems[currentPage - 1];
    if (!currentPageItem) return;
    const sigContainer = currentPageItem.querySelector('.sig-container');
    const sig = createSignatureElement();
    sig.querySelector('.signature-text').innerHTML = `<img src="${url}" style="height:60px;">`;
    sig.style.left = '50px';
    sig.style.top = '50px';
    sigContainer.appendChild(sig);
    selectSignature(sig);
    closeHandModal();
}

function createSignatureElement() {
    const div = document.createElement('div');
    div.className = 'signature';
    div.innerHTML = '<div class="signature-text"></div><div class="signature-handle"></div>';
    
    div.addEventListener('click', (e) => {
        e.stopPropagation();
        selectSignature(div);
    });

    // 拖拽逻辑（微信专用）
    let dragStartX, dragStartY, elemStartLeft, elemStartTop;
    div.addEventListener('touchstart', (e) => {
        if (e.target.classList.contains('signature-handle')) return;
        selectSignature(div);
        const touch = e.touches[0];
        dragStartX = touch.clientX;
        dragStartY = touch.clientY;
        elemStartLeft = div.offsetLeft;
        elemStartTop = div.offsetTop;
        e.preventDefault();
    }, { passive: false });

    div.addEventListener('touchmove', (e) => {
        if (!div.classList.contains('active') || e.target.classList.contains('signature-handle')) return;
        const touch = e.touches[0];
        const parent = div.parentElement;
        const newLeft = Math.max(0, Math.min(parent.offsetWidth - div.offsetWidth, elemStartLeft + touch.clientX - dragStartX));
        const newTop = Math.max(0, Math.min(parent.offsetHeight - div.offsetHeight, elemStartTop + touch.clientY - dragStartY));
        div.style.left = `${newLeft}px`;
        div.style.top = `${newTop}px`;
        e.preventDefault();
    }, { passive: false });

    // 缩放逻辑（微信专用）
    const handle = div.querySelector('.signature-handle');
    let scaleStartX, startWidth, startFontSize;
    handle.addEventListener('touchstart', (e) => {
        selectSignature(div);
        const touch = e.touches[0];
        scaleStartX = touch.clientX;
        startWidth = div.offsetWidth;
        startFontSize = parseInt(getComputedStyle(div.querySelector('.signature-text')).fontSize);
        e.stopPropagation();
        e.preventDefault();
    }, { passive: false });

    handle.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        const dx = touch.clientX - scaleStartX;
        const newWidth = Math.max(40, startWidth + dx);
        const scale = newWidth / startWidth;
        const newFontSize = Math.max(12, Math.min(72, startFontSize * scale));
        div.style.width = `${newWidth}px`;
        div.querySelector('.signature-text').style.fontSize = `${newFontSize}px`;
        e.preventDefault();
    }, { passive: false });

    return div;
}

function selectSignature(el) {
    if (activeSig) activeSig.classList.remove('active');
    activeSig = el;
    activeSig.classList.add('active');
}

function deleteActive() {
    if (activeSig) { activeSig.remove(); activeSig = null; }
}

document.getElementById('workspace').addEventListener('click', (e) => {
    if (e.target.id === 'workspace' || e.target === renderArea) {
        if (activeSig) { activeSig.classList.remove('active'); activeSig = null; }
    }
});

// ==========================================
// 【保留原功能】导出逻辑
// ==========================================
function saveImage() {
    if (pageItems.length === 0) { alert('请先上传文件'); return; }
    loading.style.display = 'flex';
    loading.innerHTML = '正在生成图片...';
    const originalDisplay = pageItems.map(item => item.style.display);
    pageItems.forEach(item => item.style.display = 'block');
    html2canvas(renderArea, {
        scale: 2, useCORS: true, backgroundColor: '#fff',
        ignoreElements: (el) => el.classList.contains('signature-handle')
    }).then(canvas => {
        pageItems.forEach((item, idx) => item.style.display = originalDisplay[idx]);
        const a = document.createElement('a');
        a.download = `signed_${Date.now()}.png`;
        a.href = canvas.toDataURL('image/png');
        a.click();
        loading.style.display = 'none';
    }).catch(err => {
        pageItems.forEach((item, idx) => item.style.display = originalDisplay[idx]);
        loading.style.display = 'none';
        alert('保存失败，请重试');
        console.error(err);
    });
}
</script>
</body>
</html>
